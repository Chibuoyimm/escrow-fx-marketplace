services:
  postgres:
    image: postgres:17-alpine
    container_name: escrow-fx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: escrow_fx_marketplace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d escrow_fx_marketplace"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
